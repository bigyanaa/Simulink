{% extends "base.html" %}

{% block title %}Answer these Question before moving on.{% endblock %}

{% block content %}
    <style>
         #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f4f4f4; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .loader {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 18px;
            color: #333;
        }
    
        :root {
            --primary: #3457D5;
            --primary-light: #e7eaf6;
            --text: #2d3748;
            --background: #f8f9fa;
        }

        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: var(--background);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .questionnaire-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 10px 10px 0 0;
        }

        .card-body {
            padding: 2rem;
        }

        h2 {
            font-size: 2rem;
            margin: 0 0 1rem 0;
            color: white;
        }

        .section-title {
            color: var(--primary);
            font-size: 1.5rem;
            margin: 2rem 0 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .question-group {
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .option-card {
            background: white;
            border: 2px solid var(--primary-light);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(52, 87, 213, 0.15);
            border-color: var(--primary);
        }

        .option-card h3 {
            margin: 0 0 0.5rem 0;
            color: var(--primary);
        }

        .option-card p {
            font-size: 0.9rem;
            color: #666;
            margin: 0;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            padding: 1.5rem;
            background: var(--primary-light);
            border-radius: 0 0 10px 10px;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
        }

        .btn-outline {
            background: none;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
            }
            
            .options-grid {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                flex-direction: column;
                gap: 1rem;
            }
            
            .btn {
                width: 100%;
                text-align: center;
            }
        }

        .hidden-radio {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .option-card.selected {
            border-color: var(--primary);
            background-color: var(--primary-light);
        }

        .option-card.selected::after {
            content: "✓";
            color: var(--primary);
            font-size: 1.2em;
            position: absolute;
            top: 10px;
            right: 10px;
        }

        form {
            display: block;
            width: 100%;
        }
    </style>
</head>
<body>
    <body>
        <div class="container">
            <form class="questionnaire-card" method="POST" action="/paraphraseAndSubmit">
                <div class="card-header">
                    <h2>{{name}} User Customization</h2>
                    <p>Help us customize your learning experience!</p>
                </div>
    
                <div class="card-body">
                    <div class="question-group">
                        <div class="section-title">
                            <span>🎯</span>
                            <h3>Your Interests</h3>
                        </div>
    
                        <div class="input-group">
                            <label>what are some of your interests? Just tell us what you love.</label>
                            <input type="text" name="favorite_activity" placeholder="e.g., Basketball, Skateboarding...">
                        </div>
                    
                    </div>
                    <input type="hidden" name="destination" value="{{destination}}">
                    <input type="hidden" name="pageId" value="{{pageId}}">
    
                    <div class="question-group">
                        <div class="section-title">
                            <span>📚</span>
                            <h3>Your Knowledge</h3>
                        </div>
    
                            <div class="input-group">
                                <label>What do you know and understand about this topic?</label>
                                <input type="text" name="kinematics_knowledge" >


                            </div>
                            <br>
                            <center><div class="d-flex justify-content-between">
                                <button class="btn btn-primary btn-sm rounded-pill px-2 py-1" onclick="showLoading()">Next</button>
                            </div></center> 
                        
                        </div>
                    </div>
                </div>
    
               
            </form>
        </div>
    
        <script>
            function showLoading()
            {
                window.location.href = 'continue/'

            }
            document.querySelectorAll('.hidden-radio').forEach(radio => {
                radio.addEventListener('change', function() {
                    document.querySelectorAll('.option-card').forEach(card => {
                        card.classList.remove('selected');
                    });
                    
                    if(this.checked) {
                        this.parentElement.classList.add('selected');
                    }
                });
            });
        </script>
{%endblock%}
